name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run script tests
        run: python3 -m unittest tests/test_prompt_cache_scripts.py

      - name: Validate skill package
        run: python3 audit-prompt-caching/scripts/validate_skill_package.py audit-prompt-caching

      - name: Run trigger eval
        run: python3 audit-prompt-caching/scripts/run_trigger_eval.py audit-prompt-caching

      - name: Compile Python syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in [*Path('audit-prompt-caching/scripts').glob('*.py'), *Path('tests').glob('*.py')]:
              compile(path.read_text(), str(path), 'exec')
              print(f'ok {path}')
          PY

      - name: Check committed whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            git diff --check "${BASE_SHA}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Ensure generated bytecode is absent
        run: |
          generated="$(find . \( -name __pycache__ -o -name '*.pyc' \) -print)"
          if [ -n "$generated" ]; then
            echo "$generated"
            exit 1
          fi
